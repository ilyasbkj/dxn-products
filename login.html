<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Acceder | DXN</title>
</head>
<body>
  <div class="container">
    <nav class="navbar" style="justify-content: center; padding: 24px;">
      <a href="/" class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#6bb052"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 7.05,10.62 10.6,13.75C12.18,14.6 14.28,15.65 17,16L18.5,14.2C15.6,13.4 13.5,12.25 11.8,11.2C14.4,10.5 17,9.5 17,8Z"/></svg>
        DXN
      </a>
    </nav>

    <main class="glass-card" style="max-width: 450px; margin: 40px auto;">
      <div style="display:flex; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 24px;">
        <div id="tab-login" style="flex:1;text-align:center;padding:12px;cursor:pointer;font-weight:600;color:var(--accent-primary);border-bottom:2px solid var(--accent-primary);">Iniciar Sesión</div>
        <div id="tab-register" style="flex:1;text-align:center;padding:12px;cursor:pointer;color:var(--text-secondary);display:none;">Crear Cuenta</div>
      </div>

      <!-- Login Form -->
      <form id="form-login">
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="login-email" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" class="form-control" required />
        </div>
        <div id="login-error" style="color: var(--danger); margin-bottom: 15px; display: none;"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Entrar</button>
        
        <div style="text-align: center; margin: 16px 0; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase;">o accede con</div>
        <button type="button" id="btn-google-login" class="btn btn-outline" style="width: 100%;">
          <img src="https://img.icons8.com/color/20/google-logo.png" style="margin-right:8px;"/> Google
        </button>
      </form>

      <!-- Register Form -->
      <form id="form-register" class="hidden">
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="reg-email" class="form-control" required />
        </div>
        <div class="form-group">
          <label>Contraseña (Mínimo 6 caracteres)</label>
          <input type="password" id="reg-password" class="form-control" required minlength="6" />
        </div>
        <div id="reg-error" style="color: var(--danger); margin-bottom: 15px; display: none;"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Crear cuenta segura</button>
        
        <div style="text-align: center; margin: 16px 0; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase;">o registra con</div>
        <button type="button" id="btn-google-register" class="btn btn-outline" style="width: 100%;">
          <img src="https://img.icons8.com/color/20/google-logo.png" style="margin-right:8px;"/> Google
        </button>
      </form>
    </main>
  </div>
  <script type="module" src="/src/js/auth.js"></script>
</body>
</html>
